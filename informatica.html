<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado - Informática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header class="container mt-4">
    <div class="card p-3">
        <h3>Simulado de Informática</h3>
        <p id="tempo">Tempo: 00:00:00</p>
    </div>
</header>

<div class="container mt-4">
    <div id="questoes"></div>

    <button id="btnFinalizar" class="btn btn-success mt-3">
        Finalizar Simulado
    </button>
</div>

<script>

const MATERIA = "Informática";

const state = {
    questoes: [],
    respostas: {},
    startTime: Date.now()
};

function iniciarTimer() {
    setInterval(() => {
        const elapsed = Math.floor((Date.now() - state.startTime) / 1000);

        const h = Math.floor(elapsed / 3600);
        const m = Math.floor((elapsed % 3600) / 60);
        const s = elapsed % 60;

        document.getElementById("tempo").textContent =
            `Tempo: ${String(h).padStart(2,'0')}:` +
            `${String(m).padStart(2,'0')}:` +
            `${String(s).padStart(2,'0')}`;
    }, 1000);
}

async function carregarSimulado() {
    try {
        const response = await fetch("http://localhost:3000/gerar-simulado", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                materia: MATERIA,
                quantidade: 5
            })
        });

        state.questoes = await response.json();
        renderizarQuestoes();

    } catch (error) {
        document.getElementById("questoes").innerHTML =
            `<div class="alert alert-danger">Erro ao carregar questões.</div>`;
    }
}

function renderizarQuestoes() {
    const container = document.getElementById("questoes");
    container.innerHTML = "";

    state.questoes.forEach((q, index) => {

        const card = document.createElement("div");
        card.className = "card mb-3 p-3";

        const alternativas = q.alternativas.map(alt => `
            <div class="form-check">
                <input class="form-check-input"
                    type="radio"
                    name="q${index}"
                    value="${alt.charAt(0)}"
                    data-index="${index}">
                <label class="form-check-label">${alt}</label>
            </div>
        `).join("");

        card.innerHTML = `
            <h5>${index + 1}) ${q.pergunta}</h5>
            ${alternativas}
        `;

        container.appendChild(card);
    });
}

document.addEventListener("change", (e) => {
    if (e.target.matches(".form-check-input")) {
        state.respostas[e.target.dataset.index] = e.target.value;
    }
});

document.getElementById("btnFinalizar").addEventListener("click", () => {

    let acertos = 0;
    const erros = [];

    state.questoes.forEach((q, index) => {
        if (state.respostas[index] === q.resposta_correta) {
            acertos++;
        } else {
            erros.push({
                pergunta: q.pergunta,
                resposta_correta: q.resposta_correta,
                sugestao: q.sugestao,
                resposta_usuario: state.respostas[index] || "Não respondeu"
            });
        }
    });

    const resultado = {
        materia: MATERIA,
        acertos: acertos,
        total: state.questoes.length,
        erros: erros
    };

    localStorage.setItem("resultadoSimulado", JSON.stringify(resultado));
    window.location.href = "resultado.html";
});

window.addEventListener("DOMContentLoaded", () => {
    iniciarTimer();
    carregarSimulado();
});

</script>

</body>
</html>
